<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Word Converter</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
.container { max-width: 600px; width: 100%; }
h1 { text-align: center; margin-bottom: 8px; color: #1a73e8; }
.subtitle { text-align: center; color: #666; margin-bottom: 32px; }
.dropzone { border: 2px dashed #bbb; border-radius: 12px; padding: 40px 20px; text-align: center; background: #fff; cursor: pointer; transition: all .2s; }
.dropzone:hover, .dropzone.dragover { border-color: #1a73e8; background: #e8f0fe; }
.dropzone.has-file { border-color: #34a853; background: #e6f4ea; }
.dropzone-icon { font-size: 48px; margin-bottom: 12px; }
.dropzone-text { font-size: 16px; color: #555; }
.dropzone-hint { font-size: 13px; color: #999; margin-top: 8px; }
.file-info { display: none; margin-top: 16px; padding: 12px; background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.file-info.visible { display: flex; align-items: center; gap: 12px; }
.file-info .name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-info .size { color: #888; font-size: 13px; }
.file-info .remove { background: none; border: none; color: #d93025; cursor: pointer; font-size: 20px; padding: 0 4px; }
.options { margin-top: 20px; display: flex; gap: 12px; }
.options label { flex: 1; padding: 14px; background: #fff; border: 2px solid #e0e0e0; border-radius: 8px; text-align: center; cursor: pointer; transition: all .2s; font-weight: 500; }
.options label:hover { border-color: #1a73e8; }
.options label:has(input:checked) { border-color: #1a73e8; background: #e8f0fe; }
.options input { display: none; }
.btn-convert { display: block; width: 100%; margin-top: 20px; padding: 16px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background .2s; }
.btn-convert:hover { background: #1557b0; }
.btn-convert:disabled { background: #aaa; cursor: not-allowed; }
.status { margin-top: 20px; padding: 16px; border-radius: 8px; display: none; }
.status.error { display: block; background: #fce8e6; color: #d93025; }
.status.success { display: block; background: #e6f4ea; color: #137333; }
.status.loading { display: flex; align-items: center; gap: 12px; background: #e8f0fe; color: #1a73e8; }
.spinner { width: 20px; height: 20px; border: 3px solid #ccc; border-top-color: #1a73e8; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
<h1>PDF to Word Converter</h1>
<p class="subtitle">Convierte tus PDFs a documentos Word editables</p>

<div class="dropzone" id="dropzone">
<div class="dropzone-icon">📄</div>
<div class="dropzone-text">Arrastra un PDF aquí o haz clic para seleccionar</div>
<div class="dropzone-hint">Solo archivos PDF</div>
</div>
<input type="file" id="fileInput" accept=".pdf" style="display:none">

<div class="file-info" id="fileInfo">
<div class="name" id="fileName"></div>
<div class="size" id="fileSize"></div>
<button class="remove" id="removeFile">&times;</button>
</div>

<div class="options">
<label><input type="radio" name="mode" value="simple" checked><span>Simple</span><br><small style="color:#888;font-weight:400">Solo texto</small></label>
<label><input type="radio" name="mode" value="advanced"><span>Avanzado</span><br><small style="color:#888;font-weight:400">Con imágenes</small></label>
</div>

<button class="btn-convert" id="btnConvert" disabled>Convertir a Word</button>

<div class="status" id="status"></div>
</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const removeBtn = document.getElementById('removeFile');
const btnConvert = document.getElementById('btnConvert');
const statusDiv = document.getElementById('status');
let selectedFile = null;

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

function handleFile(file) {
if (!file.name.toLowerCase().endsWith('.pdf')) { showStatus('Solo se aceptan archivos PDF', 'error'); return; }
selectedFile = file;
fileName.textContent = file.name;
fileSize.textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
fileInfo.classList.add('visible');
dropzone.classList.add('has-file');
btnConvert.disabled = false;
clearStatus();
}

removeBtn.addEventListener('click', () => { selectedFile = null; fileInfo.classList.remove('visible'); dropzone.classList.remove('has-file'); btnConvert.disabled = true; fileInput.value = ''; clearStatus(); });

btnConvert.addEventListener('click', async () => {
if (!selectedFile) return;
const mode = document.querySelector('input[name="mode"]:checked').value;
btnConvert.disabled = true;
showStatus('Convirtiendo...', 'loading');
const form = new FormData();
form.append('file', selectedFile);
form.append('mode', mode);
try {
const res = await fetch('/api/convert', { method: 'POST', body: form });
if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Error en la conversión'); }
const blob = await res.blob();
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = selectedFile.name.replace(/\.pdf$/i, '_' + mode + '.docx');
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
showStatus('Conversión exitosa. La descarga ha comenzado.', 'success');
} catch (e) { showStatus(e.message, 'error'); }
btnConvert.disabled = false;
});

function showStatus(msg, type) { statusDiv.className = 'status ' + type; if (type === 'loading') statusDiv.innerHTML = '<div class="spinner"></div>' + msg; else statusDiv.textContent = msg; }
function clearStatus() { statusDiv.className = 'status'; statusDiv.innerHTML = ''; }
</script>
</body>
</html>
